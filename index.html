<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TTWY · 等待你的时间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', monospace;
            position: relative;
        }

        /* ========== 加载页面 ========== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease-out;
        }

        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .loading-container {
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        .loading-title {
            font-size: 32px;
            color: #ffffff;
            text-shadow: 2px 2px 0 #ff88aa;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .loading-sub {
            font-size: 18px;
            color: #ffaabb;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 像素进度条 */
        .progress-bar-container {
            width: 100%;
            height: 24px;
            background: #1a1a1a;
            border: 2px solid #ffaabb;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #ff88aa;
            transition: width 0.1s linear;
        }

        .progress-text {
            font-size: 16px;
            color: #ffccdd;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .enter-btn-loading {
            background: #ff88aa;
            border: none;
            padding: 12px 32px;
            font-size: 20px;
            font-family: monospace;
            font-weight: bold;
            color: #1a1a1a;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 0 #aa4a62;
            transition: 0.05s linear;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .enter-btn-loading.show {
            opacity: 1;
            visibility: visible;
        }

        .enter-btn-loading:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #aa4a62;
        }

        /* 加载中动画 */
        .dot-animation {
            display: inline-block;
            animation: dotBlink 1.4s infinite;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ========== 启动页样式 ========== */
        .strawberry-box {
            width: 100%;
            max-width: 720px;
            background: #f7c5d0;
            background-image: radial-gradient(#e8a0b5 2px, transparent 2px);
            background-size: 28px 28px;
            border-radius: 20px 20px 16px 16px;
            box-shadow: 0 12px 0 #9e5a6e, 0 16px 20px rgba(0,0,0,0.3), inset 0 1px 4px rgba(255,255,220,0.8);
            position: relative;
            transition: all 0.2s ease;
            border: 3px solid #ffd0da;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .strawberry-box.show {
            opacity: 1;
        }

        .inner-border {
            margin: 8px;
            border: 2px solid #e8a0b5;
            border-radius: 14px;
            padding: 6px;
            box-shadow: inset 0 0 0 2px #ffdae4;
        }

        .cd-deco {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd0d8 20%, #e8a0b0 50%, #c07088 80%);
            border-radius: 50%;
            box-shadow: 0 0 0 3px #ffdae4, 0 0 0 6px #c06a7a, 0 6px 12px rgba(0,0,0,0.3);
            animation: spinSlow 8s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: transform 0.1s ease;
            cursor: pointer;
        }
        .cd-deco:active { transform: scale(0.95); }
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .cd1 { top: -28px; left: -28px; }
        .cd2 { bottom: -32px; right: -24px; width: 70px; height: 70px; animation-duration: 12s; animation-direction: reverse; }
        .cd3 { top: 40%; right: -38px; width: 60px; height: 60px; animation-duration: 6s; }

        .strawberry {
            position: absolute;
            font-size: 42px;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
            transition: all 0.05s linear;
        }
        .strawberry:active { transform: scale(0.9); }
        .straw1 { top: -16px; right: 20px; transform: rotate(12deg); }
        .straw2 { bottom: -28px; left: 16px; transform: rotate(-8deg); font-size: 48px; }
        .straw3 { top: 24%; left: -34px; font-size: 38px; }

        .orange-slice {
            position: absolute;
            font-size: 38px;
            filter: drop-shadow(0 3px 5px #bb7755);
            animation: pixelBounce 2s infinite;
        }
        @keyframes pixelBounce {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        .orange1 { bottom: 12px; right: 28px; }
        .orange2 { top: 48%; right: -28px; animation-duration: 2.4s; animation-delay: 0.2s; }
        .orange3 { top: 68%; left: -24px; font-size: 34px; transform: rotate(15deg); }

        .fish-deco {
            position: absolute;
            font-size: 36px;
            filter: drop-shadow(0 2px 4px #ff8899);
            animation: pixelSwim 3s ease-in-out infinite;
        }
        @keyframes pixelSwim {
            0%,100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(10px) rotate(4deg); }
        }
        .fish1 { bottom: 36px; left: 10px; }
        .fish2 { top: 58%; left: -28px; font-size: 30px; animation-direction: reverse; }
        .fish3 { bottom: 68px; right: -18px; font-size: 28px; }
        .fish4 { top: 18%; right: 16px; }

        .cat-deco {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 52px;
            filter: drop-shadow(0 6px 6px #a05068);
            transition: all 0.1s;
        }
        .cat-deco:active {
            transform: translateX(-50%) scale(0.95);
        }

        .login-panel {
            padding: 38px 28px 42px;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .title-area {
            margin-bottom: 32px;
            position: relative;
        }
        .title-area h1 {
            font-size: 44px;
            letter-spacing: 3px;
            color: #fff5f0;
            text-shadow: 3px 3px 0 #c06078, 5px 5px 0 #904a60;
            font-family: 'Courier New', monospace;
            background: #e8889e60;
            display: inline-block;
            padding: 8px 22px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-weight: bold;
        }
        .sub-glow {
            font-size: 16px;
            color: #fff0e8;
            background: #d4708a60;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            margin-top: 12px;
            backdrop-filter: blur(2px);
        }

        .territory-tag {
            margin-top: 16px;
            font-size: 15px;
            color: #fff0e0;
            background: #c8688260;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            letter-spacing: 1px;
        }

        .password-container {
            background: #ffe4eadd;
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px 24px;
            margin: 20px 0;
            border: 3px solid #e8a0b4;
            box-shadow: 0 8px 0 #b06078, inset 0 0 16px #ffeef4;
        }

        .lock-icon {
            font-size: 34px;
            margin-bottom: 12px;
            filter: drop-shadow(2px 2px 0 #c06a7a);
        }

        .password-input-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .pixel-pw-field {
            background: #fff8fc;
            border: 3px solid #e8a0b4;
            padding: 12px 14px;
            font-size: 32px;
            width: 200px;
            text-align: center;
            font-family: 'Courier New', monospace;
            letter-spacing: 6px;
            color: #b04060;
            border-radius: 40px;
            outline: none;
            font-weight: bold;
            box-shadow: inset 0 2px 4px #d0a0b0;
        }
        .pixel-pw-field:focus {
            border-color: #d06080;
            box-shadow: 0 0 0 3px #ffc0d0, inset 0 2px 4px #d0a0b0;
        }

        .enter-btn {
            background: #e888a0;
            border: none;
            padding: 12px 30px;
            font-size: 22px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #b04462;
            border-radius: 60px;
            box-shadow: 0 5px 0 #a05068;
            transition: 0.03s linear;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .enter-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a05068;
        }

        .message-area {
            margin-top: 18px;
            min-height: 48px;
        }
        .error-bubble {
            background: #ffd8e0;
            color: #b84868;
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
            border-left: 5px solid #ff6080;
            font-family: monospace;
        }

        .missing-footer {
            margin-top: 26px;
            font-size: 14px;
            color: #fff0e4;
            text-shadow: 1px 1px 0 #b05870;
            background: #d0708a60;
            display: inline-block;
            padding: 8px 22px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            line-height: 1.5;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .paw-prints {
            position: absolute;
            bottom: 8px;
            left: 16px;
            font-size: 22px;
            opacity: 0.5;
            letter-spacing: 4px;
        }

        .shake-effect {
            animation: pixelShake 0.2s ease-in-out 0s 2;
        }
        @keyframes pixelShake {
            0% { transform: translateX(0px); }
            25% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }

        footer {
            font-size: 10px;
            margin-top: 18px;
            color: #e8889e;
            text-shadow: 0 1px 0 #ffd0dc;
        }

        .music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #e888a0dd;
            backdrop-filter: blur(4px);
            border: 2px solid #fff0e8;
            border-radius: 50px;
            padding: 8px 14px;
            font-size: 20px;
            font-family: monospace;
            color: white;
            text-shadow: 1px 1px 0 #a05068;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 3px 0 #9e5a6e;
            transition: 0.05s linear;
            z-index: 1000;
            cursor: pointer;
        }
        .music-toggle:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9e5a6e;
        }
        .music-toggle span {
            font-size: 18px;
        }
        @media (max-width: 600px) {
            .music-toggle {
                padding: 6px 12px;
                font-size: 18px;
                bottom: 12px;
                right: 12px;
            }
            .music-toggle span {
                font-size: 14px;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>

<!-- 黑色加载页面 -->
<div id="loadingScreen" class="loading-screen">
    <div class="loading-container">
        <div class="loading-title">等待你的时间</div>
        <div class="loading-sub">✦ 加载中 <span class="dot-animation">...</span> ✦</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
        <button id="enterBtn" class="enter-btn-loading">🎵 点击进入 🎵</button>
    </div>
</div>

<!-- 启动页（初始隐藏） -->
<div id="startPage" class="strawberry-box" style="opacity: 0;">
    <div class="inner-border">
        <div class="cd-deco cd1">💿</div>
        <div class="cd-deco cd2">📀</div>
        <div class="cd-deco cd3">💿</div>

        <div class="strawberry straw1">🍓</div>
        <div class="strawberry straw2">🍓🍓</div>
        <div class="strawberry straw3">🍓</div>

        <div class="orange-slice orange1">🍊</div>
        <div class="orange-slice orange2">🍊</div>
        <div class="orange-slice orange3">🍊</div>

        <div class="fish-deco fish1">🐟</div>
        <div class="fish-deco fish2">🐠</div>
        <div class="fish-deco fish3">🐡</div>
        <div class="fish-deco fish4">🐟</div>

        <div class="cat-deco">🐱 🍓</div>

        <div class="login-panel">
            <div class="title-area">
                <h1>等待你的时间</h1>
                <div class="sub-glow">🍓 草莓 · 橘子汽水年代 🍊</div>
                <div class="territory-tag">🐱 🐟 这里是小猫和小鱼的地盘 🐟 🐱</div>
            </div>

            <div class="password-container">
                <div class="lock-icon">🔐 🐈 🐠</div>
                <div class="password-input-area">
                    <input type="password" id="secretCode" class="pixel-pw-field" maxlength="4" placeholder="****" inputmode="numeric">
                    <button id="unlockBtn" class="enter-btn">➤ 踏入时光</button>
                </div>
                <div class="message-area" id="msgArea"></div>
            </div>
            
            <div class="missing-footer">
                🌙 你想念我的时候来到这里<br>这里也都是我对你的想念 ✨
            </div>
            
            <footer>🐾 光盘旋转 · 小猫守护的思念频率 🐾</footer>
        </div>
        <div class="paw-prints">🐾 🐾 🐾 🐟</div>
    </div>
</div>

<div id="musicToggle" class="music-toggle" style="display: none;">
    <span id="musicIcon">🎵</span>
    <span id="musicText">ON</span>
</div>

<script>
    // ========== 音频变量 ==========
    let bgmAudio = null;
    let audioCD1 = null;
    let audioCD2 = null;
    let audioCD3 = null;
    let isBgmPlaying = false;
    let isBgmEnabled = true;
    let bgmPausedByDisk = false;  // 新增：记录BGM是否被光盘暂停

    // ========== 预加载所有音频 ==========
    function preloadAudio() {
        return new Promise((resolve) => {
            const audioFiles = [
                { name: 'bgm', path: 'sounds/bgm.mp3', type: 'bgm' },
                { name: 'disk1', path: 'sounds/disk1.mp3', type: 'disk' },
                { name: 'disk2', path: 'sounds/disk2.mp3', type: 'disk' },
                { name: 'disk3', path: 'sounds/disk3.mp3', type: 'disk' }
            ];
            
            let loadedCount = 0;
            const totalFiles = audioFiles.length;
            
            function updateProgress() {
                const percent = Math.floor((loadedCount / totalFiles) * 100);
                const progressFill = document.getElementById('progressFill');
                const progressText = document.getElementById('progressText');
                if (progressFill) progressFill.style.width = percent + '%';
                if (progressText) progressText.innerText = percent + '%';
            }
            
            function onFileLoaded() {
                loadedCount++;
                updateProgress();
                if (loadedCount === totalFiles) {
                    console.log('✅ 所有音频加载完成');
                    showEnterButton();
                    resolve();
                }
            }
            
            audioFiles.forEach((file, index) => {
                const audio = new Audio();
                audio.preload = 'auto';
                
                audio.addEventListener('canplaythrough', () => {
                    console.log(`✅ 加载完成: ${file.path}`);
                    if (file.type === 'bgm') {
                        bgmAudio = audio;
                        bgmAudio.loop = true;
                        bgmAudio.volume = 0.4;
                    } else {
                        if (file.name === 'disk1') audioCD1 = audio;
                        if (file.name === 'disk2') audioCD2 = audio;
                        if (file.name === 'disk3') audioCD3 = audio;
                    }
                    onFileLoaded();
                });
                
                audio.addEventListener('error', (e) => {
                    console.warn(`⚠️ 加载失败: ${file.path}`, e);
                    // 即使失败也继续
                    onFileLoaded();
                });
                
                audio.src = file.path;
                audio.load();
            });
        });
    }
    
    // 显示进入按钮
    function showEnterButton() {
        const enterBtn = document.getElementById('enterBtn');
        if (enterBtn) {
            enterBtn.classList.add('show');
        }
    }
    
    // 开始播放 BGM
    function startBGM() {
        if (bgmAudio && isBgmEnabled) {
            bgmAudio.play().catch(e => console.log('BGM 播放失败', e));
            isBgmPlaying = true;
        }
    }
    
    // 切换 BGM
    function toggleBGM() {
        if (!bgmAudio) return;
        
        isBgmEnabled = !isBgmEnabled;
        
        if (isBgmEnabled) {
            // 清除光盘暂停标记
            bgmPausedByDisk = false;
            bgmAudio.play().catch(e => console.log('播放失败', e));
            isBgmPlaying = true;
        } else {
            bgmAudio.pause();
            isBgmPlaying = false;
        }
        
        updateMusicButtonUI();
    }
    
    function updateMusicButtonUI() {
        const icon = document.getElementById('musicIcon');
        const text = document.getElementById('musicText');
        if (isBgmEnabled && bgmAudio) {
            icon.innerHTML = '🎵';
            text.innerHTML = 'ON';
        } else {
            icon.innerHTML = '🔇';
            text.innerHTML = 'OFF';
        }
    }
    
    // 播放光盘音效（暂停BGM，播完恢复）
    function playDiskSound(diskId) {
        if (!isBgmEnabled) return;
        
        let sound = null;
        if (diskId === 'cd1') sound = audioCD1;
        if (diskId === 'cd2') sound = audioCD2;
        if (diskId === 'cd3') sound = audioCD3;
        
        if (sound) {
            // 如果BGM正在播放，先暂停它
            if (bgmAudio && isBgmPlaying) {
                bgmAudio.pause();
                isBgmPlaying = false;
                bgmPausedByDisk = true;
            }
            
            // 播放音效
            sound.currentTime = 0;
            sound.play().catch(e => console.log('音效播放失败', e));
            
            // 音效播放完毕后恢复BGM
            sound.onended = () => {
                if (bgmPausedByDisk && isBgmEnabled && bgmAudio) {
                    bgmAudio.play().catch(e => console.log('BGM恢复失败', e));
                    isBgmPlaying = true;
                    bgmPausedByDisk = false;
                }
                sound.onended = null; // 清理事件，避免重复触发
            };
        }
    }
    
    // 绑定光盘点击
    function bindDiskClickEvents() {
        const disks = [
            { el: document.querySelector('.cd1'), id: 'cd1' },
            { el: document.querySelector('.cd2'), id: 'cd2' },
            { el: document.querySelector('.cd3'), id: 'cd3' }
        ];
        
        disks.forEach(disk => {
            if (disk.el) {
                disk.el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playDiskSound(disk.id);
                });
            }
        });
    }
    
    // 进入启动页
    function enterStartPage() {
        const loadingScreen = document.getElementById('loadingScreen');
        const startPage = document.getElementById('startPage');
        const musicToggle = document.getElementById('musicToggle');
        
        loadingScreen.classList.add('hide');
        startPage.style.opacity = '1';
        startPage.style.transition = 'opacity 0.5s ease';
        musicToggle.style.display = 'flex';
        
        // 开始播放 BGM
        startBGM();
        
        // 聚焦输入框
        document.getElementById('secretCode').focus();
    }
    
    // ========== 登录逻辑 ==========
    const PASSWORD_CAT = "7997";
    const PASSWORD_FISH = "9779";
    
    const passwordInput = document.getElementById('secretCode');
    const unlockBtn = document.getElementById('unlockBtn');
    const msgArea = document.getElementById('msgArea');
    const startPage = document.getElementById('startPage');
    
    // BGM 按钮
    const musicToggleBtn = document.getElementById('musicToggle');
    if (musicToggleBtn) {
        musicToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleBGM();
        });
    }
    
    function showMessage(text, isError = true) {
        msgArea.innerHTML = `<div class="error-bubble">${isError ? '🍓💔🐟 ' : '🐱✨🐟 '}${text}</div>`;
        if (!isError) {
            startPage.style.transition = '0.2s';
            startPage.style.boxShadow = '0 0 0 4px #ffc0d0, 0 0 0 8px #ffa5bb, 0 20px 30px rgba(0,0,0,0.2)';
            setTimeout(() => {
                startPage.style.boxShadow = '';
            }, 400);
        } else {
            startPage.classList.add('shake-effect');
            setTimeout(() => startPage.classList.remove('shake-effect'), 400);
        }
        if(isError){
            setTimeout(() => {
                if(msgArea.innerHTML.includes('💔')) msgArea.innerHTML = '';
            }, 2000);
        }
    }
    
    function clearMessage() {
        if(msgArea.innerHTML.includes('error-bubble')) msgArea.innerHTML = '';
    }
    
    function attemptUnlock() {
        const enteredCode = passwordInput.value.trim();
        if (enteredCode === "") {
            showMessage("暗号空空… 小鱼吐了个泡泡 🐡", true);
            return;
        }
        
        if (enteredCode === PASSWORD_CAT) {
            showMessage("门扉轻启 · 即将进入小猫的世界 🐱💫", false);
            setTimeout(() => {
                showToast('🐱 欢迎来到小猫世界 · 游戏正在建设中 🍓');
                passwordInput.value = '';
            }, 300);
        } 
        else if (enteredCode === PASSWORD_FISH) {
            showMessage("水波荡漾 · 即将进入小鱼的世界 🐠💫", false);
            setTimeout(() => {
                showToast('🐟 欢迎来到小鱼世界 · 游戏正在建设中 🍊');
                passwordInput.value = '';
            }, 300);
        }
        else {
            showMessage(`“${enteredCode}” 不是思念暗号… 小猫歪头 🐱❓`, true);
            passwordInput.value = '';
            passwordInput.focus();
            const strawberrys = document.querySelectorAll('.strawberry');
            strawberrys.forEach(s => {
                s.style.transform = 'rotate(6deg)';
                setTimeout(() => s.style.transform = '', 120);
            });
        }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = '#e888a0ee';
        toast.style.color = '#2e1420';
        toast.style.padding = '10px 24px';
        toast.style.borderRadius = '40px';
        toast.style.fontFamily = 'monospace';
        toast.style.fontWeight = 'bold';
        toast.style.backdropFilter = 'blur(8px)';
        toast.style.zIndex = '3000';
        toast.style.border = '2px solid white';
        toast.style.fontSize = '14px';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    passwordInput.addEventListener('input', (e) => {
        let val = e.target.value;
        val = val.replace(/[^0-9]/g, '');
        if (val.length > 4) val = val.slice(0,4);
        e.target.value = val;
        if (msgArea.innerHTML) clearMessage();
    });
    
    unlockBtn.addEventListener('click', attemptUnlock);
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            attemptUnlock();
        }
    });
    
    // ========== 页面初始化 ==========
    window.addEventListener('load', async () => {
        console.log('🎵 开始预加载音频...');
        await preloadAudio();
        
        // 绑定进入按钮
        const enterBtn = document.getElementById('enterBtn');
        enterBtn.addEventListener('click', () => {
            enterStartPage();
            bindDiskClickEvents();
        });
    });
</script>
</body>
</html>
